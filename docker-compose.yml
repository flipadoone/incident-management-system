services:
  postgres:
    image: postgres:16-alpine
    container_name: viaappia_incident_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: incident_management
      POSTGRES_USER: viaappia
      POSTGRES_PASSWORD: viaappia123

    ports:
      - "5432:5432"

    volumes:
      - viaappia_postgres_data:/var/lib/postgresql/data

    networks:
      - viaappia_network

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U viaappia -d incident_management
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: viaappia_incident_backend
    restart: unless-stopped

    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/incident_management
      DATABASE_USERNAME: viaappia
      DATABASE_PASSWORD: viaappia123
      SERVER_PORT: 8080
      HIBERNATE_SQL_LOG_LEVEL: info
      HIBERNATE_BIND_LOG_LEVEL: info

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - viaappia_network

    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --tries=1 --spider http://localhost:8080/v3/api-docs || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: viaappia_incident_frontend
    restart: unless-stopped

    ports:
      - "4200:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - viaappia_network

volumes:
  viaappia_postgres_data:
    name: viaappia_postgres_data

networks:
  viaappia_network:
    name: viaappia_network
    driver: bridge