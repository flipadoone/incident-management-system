spring:
  application:
    name: incident-management-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/incident_management}
    username: ${DATABASE_USERNAME:viaappia}
    password: ${DATABASE_PASSWORD:viaappia123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    cache-names:
      - incidents
      - incidentById
      - stats
      - commentsByIncident
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:debug}
    org.hibernate.orm.jdbc.bind: ${HIBERNATE_BIND_LOG_LEVEL:trace}